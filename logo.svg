<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60" role="img" aria-label="DASS Bindra Consulting">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Hexagon with network nodes -->
  <g transform="translate(2, 2)">
    <!-- Hexagon background -->
    <polygon points="28,1 49,13 49,37 28,49 7,37 7,13"
      fill="url(#grad1)" />

    <!-- Inner circuit / network lines -->
    <line x1="28" y1="14" x2="28" y2="36" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <line x1="16" y1="21" x2="40" y2="21" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <line x1="16" y1="29" x2="40" y2="29" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <line x1="16" y1="21" x2="28" y2="14" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <line x1="40" y1="21" x2="28" y2="14" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <line x1="16" y1="29" x2="28" y2="36" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <line x1="40" y1="29" x2="28" y2="36" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

    <!-- Network nodes -->
    <circle cx="28" cy="14" r="3"  fill="white" opacity="0.95"/>
    <circle cx="16" cy="21" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="40" cy="21" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="28" cy="25" r="3.5" fill="white" opacity="1"/>
    <circle cx="16" cy="29" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="40" cy="29" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="28" cy="36" r="3"  fill="white" opacity="0.95"/>

    <!-- Center dot accent -->
    <circle cx="28" cy="25" r="1.5" fill="url(#grad2)" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(66, 0)">
    <!-- DASS -->
    <text x="0" y="34"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="26"
      font-weight="800"
      letter-spacing="-0.5"
      fill="url(#grad1)">DASS</text>

    <!-- Bindra -->
    <text x="76" y="34"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="26"
      font-weight="800"
      letter-spacing="-0.5"
      fill="#0f172a"> Bindra</text>

    <!-- Consulting tag -->
    <text x="1" y="50"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="10"
      font-weight="600"
      letter-spacing="3"
      fill="#64748b">CONSULTING</text>

    <!-- Thin underline accent -->
    <rect x="0" y="54" width="60" height="2" rx="1" fill="url(#grad1)" opacity="0.7"/>
  </g>
</svg>
