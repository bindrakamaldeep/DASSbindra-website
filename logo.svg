<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64" role="img" aria-label="DASS Bindra Consulting">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Icon: Stylized "DB" monogram inside a rounded square -->
  <rect x="2" y="4" width="56" height="56" rx="14" fill="url(#blueGrad)"/>

  <!-- Letter D -->
  <path d="M14 18 L14 46 L22 46 Q34 46 34 32 Q34 18 22 18 Z
           M20 24 L22 24 Q28 24 28 32 Q28 40 22 40 L20 40 Z"
        fill="white"/>

  <!-- Letter B -->
  <path d="M37 18 L37 46 L47 46 Q54 46 54 39 Q54 35 50 33 Q54 31 54 26 Q54 18 47 18 Z
           M43 24 L46 24 Q48 24 48 27 Q48 30 46 30 L43 30 Z
           M43 35 L47 35 Q50 35 50 39 Q50 42 47 42 L43 42 Z"
        fill="white"/>

  <!-- Wordmark -->
  <!-- DASS in white bold -->
  <text x="72" y="30"
    font-family="'Segoe UI', system-ui, Arial, sans-serif"
    font-size="22"
    font-weight="800"
    fill="white"
    letter-spacing="-0.3">DASS</text>

  <!-- Bindra in accent blue -->
  <text x="132" y="30"
    font-family="'Segoe UI', system-ui, Arial, sans-serif"
    font-size="22"
    font-weight="800"
    fill="url(#iconGrad)"
    letter-spacing="-0.3"> Bindra</text>

  <!-- Divider line -->
  <rect x="72" y="36" width="180" height="1.5" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- CONSULTING tagline -->
  <text x="73" y="52"
    font-family="'Segoe UI', system-ui, Arial, sans-serif"
    font-size="9.5"
    font-weight="600"
    fill="rgba(255,255,255,0.5)"
    letter-spacing="3.5">CONSULTING</text>

  <!-- Small accent dot before CONSULTING -->
  <circle cx="66" cy="48" r="2.5" fill="url(#blueGrad)"/>
</svg>
